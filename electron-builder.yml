appId: com.dcranking.app
productName: DC 댓글·글 랭킹
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
win:
  executableName: dc-ranking
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-setup-${version}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  runAfterFinish: true

portable:
  artifactName: ${productName}-portable-${version}.${ext}
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
linux:
  target:
    - AppImage
  category: Utility
